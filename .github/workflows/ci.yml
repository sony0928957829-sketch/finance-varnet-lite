name: Pull Request Checks

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "config/**"
      - "src/**"
      - "tests/**"
      - "requirements.txt"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests -q

      - name: Run mock report
        run: python -m src.main --mode mock

      - name: Verify live features exclude future labels
        run: |
          python - <<'PY'
          from pathlib import Path

          import pandas as pd

          from src.features.labels import range_label_columns

          features = pd.read_parquet(Path("data/features/features_mock.parquet"))
          leaked = sorted(set(range_label_columns()) & set(features.columns))
          if leaked:
              raise SystemExit(f"Future labels leaked into live features: {leaked}")
          print("Live feature leakage check passed.")
          PY
