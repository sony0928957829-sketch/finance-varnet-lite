name: Daily Market Report

on:
  workflow_dispatch:
    inputs:
      test_failure_notification:
        description: "Test the GitHub Issue failure notification"
        required: false
        default: false
        type: boolean

  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-market-report.yml"
      - "config/**"
      - "src/**"
      - "tests/**"
      - "requirements.txt"

  schedule:
    # 台灣時間 07:30，美股收盤後
    # UTC 時間 23:30
    - cron: "30 23 * * *"

    # 台灣時間 15:30，台股交易日收盤後
    # UTC 時間 07:30
    - cron: "30 7 * * 1-5"

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-market-report
  cancel-in-progress: false

jobs:
  run-daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Test failure notification
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.test_failure_notification }}
        run: |
          echo "Intentional failure requested to test notifications."
          exit 1

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Run market report
        run: python -m src.main --mode yfinance

      - name: Upload data health diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: data-health-${{ github.run_id }}
          path: data/reports/*_data_health.json
          if-no-files-found: warn
          retention-days: 30

      - name: Validate market report
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          reports = sorted(Path("data/reports").glob("*_market_report.md"))
          if not reports:
              raise SystemExit("No Markdown market report was generated.")

          report = reports[-1].read_text(encoding="utf-8")
          required_text = [
              "每日市場觀察報告",
              "今日自動摘要",
              "市場狀態",
              "平均風險分數",
              "今日異常訊號",
              "未來高低區間模型",
              "外部資料來源狀態",
              "2330.TW",
              "2317.TW",
              "2382.TW",
              "TAIEX",
              "^VIX",
              "^TNX",
              "DX-Y.NYB",
              "TWD=X",
              "不構成買賣建議",
              "不做交易決策",
          ]
          missing = [text for text in required_text if text not in report]
          if missing:
              raise SystemExit(f"Report is missing required text: {missing}")

          print(f"Validated report: {reports[-1]}")

          health_reports = sorted(Path("data/reports").glob("*_data_health.json"))
          if not health_reports:
              raise SystemExit("No data health report was generated.")
          health = json.loads(health_reports[-1].read_text(encoding="utf-8"))
          if health.get("status") == "error":
              raise SystemExit(f"Data health failed: {health.get('issues', [])}")
          print(f"Validated health report: {health_reports[-1]}")

          supplemental_reports = sorted(
              Path("data/reports").glob("*_supplemental_health.json")
          )
          if not supplemental_reports:
              raise SystemExit("No supplemental data health report was generated.")
          supplemental = json.loads(
              supplemental_reports[-1].read_text(encoding="utf-8")
          )
          required_routes = {
              "price_routes",
              "news.market_events",
              "chip.taiwan_institutional",
              "chip.taiwan_margin_short",
              "derivatives.taiwan_futures_open_interest",
              "derivatives.taiwan_options",
          }
          missing_routes = sorted(required_routes - set(supplemental))
          if missing_routes:
              raise SystemExit(
                  f"Supplemental health is missing routes: {missing_routes}"
              )
          print(f"Validated supplemental health: {supplemental_reports[-1]}")
          PY

      - name: Upload generated data
        uses: actions/upload-artifact@v7
        with:
          name: market-report-${{ github.run_id }}
          path: |
            data/reports/*_market_report.md
            data/reports/*_data_health.json
            data/normalized/prices_yfinance.parquet
            data/features/features_yfinance.parquet
            data/labels/labels_yfinance.parquet
            data/alternative/*.parquet
            data/reports/*_supplemental_health.json
          if-no-files-found: error
          retention-days: 30

      - name: Commit generated reports
        run: |
          git config user.name "market-report-bot"
          git config user.email "market-report-bot@example.com"

          git add data/reports

          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: daily market report [skip ci]"
            git push
          fi

      - name: Create or update failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="[Alert] Daily Market Report failed"
          body=$(cat <<EOF
          Daily Market Report failed.

          - Run: ${RUN_URL}
          - Event: ${{ github.event_name }}
          - Branch: ${{ github.ref_name }}
          - Commit: ${{ github.sha }}

          Please open the run link and inspect the failed step.
          EOF
          )

          issue_number=$(gh issue list \
            --repo "${GH_REPO}" \
            --state open \
            --search "${title} in:title" \
            --json number,title \
            --jq 'map(select(.title == "[Alert] Daily Market Report failed")) | first | .number // empty')

          if [ -n "${issue_number}" ]; then
            gh issue comment "${issue_number}" --repo "${GH_REPO}" --body "${body}"
          else
            gh issue create --repo "${GH_REPO}" --title "${title}" --body "${body}"
          fi
