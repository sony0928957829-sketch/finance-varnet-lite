name: Daily Market Report

on:
  workflow_dispatch:

  schedule:
    # 台灣時間 07:30，美股收盤後
    # UTC 時間 23:30
    - cron: "30 23 * * *"

    # 台灣時間 15:30，台股交易日收盤後
    # UTC 時間 07:30
    - cron: "30 7 * * 1-5"

permissions:
  contents: write

concurrency:
  group: daily-market-report
  cancel-in-progress: false

jobs:
  run-daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Run market report
        run: python -m src.main --mode yfinance

      - name: Upload generated data
        uses: actions/upload-artifact@v4
        with:
          name: market-report-${{ github.run_id }}
          path: |
            data/reports/*_market_report.md
            data/normalized/prices_yfinance.parquet
            data/features/features_yfinance.parquet
            data/labels/labels_yfinance.parquet
          if-no-files-found: error
          retention-days: 30

      - name: Commit generated reports
        run: |
          git config user.name "market-report-bot"
          git config user.email "market-report-bot@example.com"

          git add data/reports
          git add -f data/normalized data/features

          if git diff --cached --quiet; then
            echo "No generated data changes to commit."
          else
            git commit -m "chore: daily market report [skip ci]"
            git push
          fi
