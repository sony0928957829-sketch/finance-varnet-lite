name: Daily Market Report

on:
  workflow_dispatch:
    inputs:
      test_failure_notification:
        description: "Force a failure to verify the issue-notification path"
        type: boolean
        default: false

  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-market-report.yml"
      - "config/**"
      - "src/**"
      - "tests/**"
      - "requirements.txt"

  schedule:
    # 台灣時間 07:30，美股收盤後
    # UTC 時間 23:30
    - cron: "30 23 * * *"

    # 台灣時間 15:30，台股交易日收盤後
    # UTC 時間 07:30
    - cron: "30 7 * * 1-5"

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-market-report
  cancel-in-progress: false

jobs:
  run-daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Exercise failure notification (manual)
        if: ${{ inputs.test_failure_notification }}
        run: |
          echo "Forcing a failure to exercise the issue-notification path."
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests -q

      - name: Run market report
        run: python -m src.main --mode yfinance

      - name: Validate market report
        run: |
          python - <<'PY'
          from pathlib import Path

          reports = sorted(Path("data/reports").glob("*_market_report.md"))
          if not reports:
              raise SystemExit("No Markdown market report was generated.")

          report = reports[-1].read_text(encoding="utf-8")
          required_text = [
              "每日市場觀察報告",
              "今日自動摘要",
              "市場狀態",
              "今日異常訊號",
              "未來高低區間模型",
              "不構成買賣建議",
              "不做交易決策",
          ]
          missing = [text for text in required_text if text not in report]
          if missing:
              raise SystemExit(f"Report is missing required text: {missing}")

          print(f"Validated report: {reports[-1]}")
          PY

      - name: Smoke check expected supplemental datasets
        if: always()
        run: |
          python - <<'PY'
          import glob, sys
          expected = ["2330.TW", "TAIEX", "derivatives.taiwan_options"]
          files = sorted(glob.glob("data/reports/*_supplemental_health.json"))
          if not files:
              print("No supplemental health report yet; skipping dataset smoke check.")
              sys.exit(0)
          text = open(files[-1], encoding="utf-8").read()
          missing = [k for k in expected if k not in text]
          if missing:
              print(f"::warning::Supplemental report missing expected keys: {missing}")
          else:
              print("All expected supplemental symbols/datasets present.")
          PY

      - name: Upload generated data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: market-report-${{ github.run_id }}
          path: |
            data/reports/*_market_report.md
            data/reports/*_data_health.json
            data/reports/*_supplemental_health.json
            data/normalized/*.parquet
            data/features/*.parquet
            data/labels/*.parquet
            data/alternative/*.parquet
            data/evaluation/*
          if-no-files-found: warn
          retention-days: 30

      - name: Commit generated reports
        run: |
          git config user.name "market-report-bot"
          git config user.email "market-report-bot@example.com"

          git add data/reports data/normalized data/features data/labels data/alternative data/evaluation || true

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "chore: daily market report [skip ci]"
            git push
          fi

      - name: Notify on failure via issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="❌ Daily market report failed"
          body="Run failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$title" --body "$body"
          fi
